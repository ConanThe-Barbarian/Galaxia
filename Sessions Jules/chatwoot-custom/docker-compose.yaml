version: '3'
services:
  web:
    image: stellar-chatwoot:latest
    restart: always
    ports: ["3000:3000"]
    env_file: .env
    environment: [NODE_ENV=production, RAILS_ENV=production, INSTALLATION_NAME=Stellar Syntec]
    command: bundle exec rails s -p 3000 -b 0.0.0.0
    depends_on: [postgres, redis]
    volumes: [storage_data:/app/storage]
  worker:
    image: stellar-chatwoot:latest
    restart: always
    env_file: .env
    environment: [NODE_ENV=production, RAILS_ENV=production]
    command: bundle exec sidekiq -C config/sidekiq.yml
    depends_on: [postgres, redis]
    volumes: [storage_data:/app/storage]
  postgres:
    image: pgvector/pgvector:pg16
    restart: always
    ports: ['5432:5432']
    volumes: [postgres_data:/var/lib/postgresql/data]
    environment: [POSTGRES_DB=chatwoot_production, POSTGRES_USER=postgres, POSTGRES_PASSWORD=${POSTGRES_PASSWORD}]
  redis:
    image: redis:alpine
    restart: always
    volumes: [redis_data:/data]
    command: ["sh", "-c", "redis-server --requirepass \"$REDIS_PASSWORD\""]
volumes: {postgres_data, redis_data, storage_data}
